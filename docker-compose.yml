services:

  # ── rAthena: Database ─────────────────────────────────────────────────────
  rathena-db:
    image: "mariadb:noble"
    container_name: "rathena-db"
    volumes:
      - "rathenadb:/var/lib/mysql"
      - "./rathena/sql-files/:/docker-entrypoint-initdb.d"
    environment:
      MYSQL_ROOT_PASSWORD: ragnarok
      MYSQL_DATABASE: ragnarok
      MYSQL_USER: ragnarok
      MYSQL_PASSWORD: ragnarok
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── rAthena: Builder (compiles, then exits) ───────────────────────────────
  # On first run: ./configure + make clean server  (~5–10 min)
  # On subsequent runs: skips if binaries already exist in the volume
  rathena-builder:
    build:
      context: ./rathena/tools/docker
      dockerfile: Dockerfile
    image: "rathena:local"
    container_name: "rathena-builder"
    working_dir: /rathena
    command: "sh /rathena/tools/docker/builder.sh"
    restart: "no"
    volumes:
      - "./rathena:/rathena"
      - "./docker/rathena/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./docker/rathena/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./docker/rathena/map_conf.txt:/rathena/conf/import/map_conf.txt"
    environment:
      BUILDER_CONFIGURE: "--enable-packetver=20250402"

  # ── rAthena: Login server (port 6900) ─────────────────────────────────────
  rathena-login:
    image: "rathena:local"
    container_name: "rathena-login"
    working_dir: /rathena
    command: sh -c "/bin/wait-for rathena-db:3306 -- ./login-server"
    ports:
      - "6900:6900"
    volumes:
      - "./rathena:/rathena"
      - "./docker/rathena/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./docker/rathena/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./docker/rathena/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    depends_on:
      rathena-db:
        condition: service_healthy
      rathena-builder:
        condition: service_completed_successfully

  # ── rAthena: Char server (port 6121) ──────────────────────────────────────
  rathena-char:
    image: "rathena:local"
    container_name: "rathena-char"
    working_dir: /rathena
    command: sh -c "/bin/wait-for rathena-db:3306 -- /bin/wait-for rathena-login:6900 -- ./char-server"
    ports:
      - "6121:6121"
    volumes:
      - "./rathena:/rathena"
      - "./docker/rathena/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./docker/rathena/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./docker/rathena/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    depends_on:
      - rathena-login

  # ── rAthena: Map server (port 5121) ───────────────────────────────────────
  rathena-map:
    image: "rathena:local"
    container_name: "rathena-map"
    working_dir: /rathena
    command: sh -c "/bin/wait-for rathena-db:3306 -- /bin/wait-for rathena-char:6121 -- ./map-server"
    ports:
      - "5121:5121"
    volumes:
      - "./rathena:/rathena"
      - "./docker/rathena/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./docker/rathena/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./docker/rathena/map_conf.txt:/rathena/conf/import/map_conf.txt"
      - "botchling-ipc:/var/run/botchling"
    init: true
    depends_on:
      - rathena-char

  # ── Botchling: MongoDB (raw events) ───────────────────────────────────────
  botchling-mongodb:
    image: mongo:8
    container_name: "botchling-mongodb"
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Botchling: Grafana (dashboard) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: "botchling-grafana"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      botchling-mongodb:
        condition: service_healthy

  # ── Botchling: Rust backend ───────────────────────────────────────────────
  botchling:
    build: ./backend
    container_name: "botchling"
    restart: on-failure
    volumes:
      - "botchling-ipc:/var/run/botchling"
    environment:
      APP_NAME: botchling
      SOCKET_PATH: /var/run/botchling/botchling.sock
      MONGO_HOST: botchling-mongodb
      MONGO_PORT: 27017
      MONGO_DB: ${MONGO_DB:-botchling_database}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      LOG_LEVEL: trace
    depends_on:
      botchling-mongodb:
        condition: service_started

volumes:
  rathenadb:
  mongo_data:
  grafana_data:
  botchling-ipc:
